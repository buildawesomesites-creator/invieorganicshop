<!DOCTYPE html>
<html lang="en">
<body>
    <select id="category-select" onchange="loadCategory(this.value)">
        <option value="dairy">Dairy</option>
        <option value="vegetables">Vegetables</option>
        <option value="drinks">Drinks</option>
    </select>

    <div id="product-container" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px;"></div>

    <script>
        async function loadCategory(category) {
            const container = document.getElementById('product-container');
            container.innerHTML = 'Loading...';

            try {
                // RELATIVE PATH: This looks for the file in the same folder as the HTML
                // Make sure your folder structure is /products/dairy.json
                const response = await fetch(`./products/${category}.json`);
                
                if (!response.ok) throw new Error(`HTTP Error: ${response.status}`);
                
                const products = await response.json();
                container.innerHTML = ''; 
                
                products.forEach(product => {
                    const card = document.createElement('div');
                    card.className = 'product-card';
                    card.style.border = "1px solid #ccc";
                    card.style.padding = "10px";
                    card.innerHTML = `
                        <img src="${product.image}" alt="${product.title}" style="width:100%">
                        <h3>${product.title}</h3>
                        <p>Price: ${product.price}</p>
                    `;
                    container.appendChild(card);
                });
            } catch (error) {
                container.innerHTML = 'Could not load products. Check console for error.';
                console.error("Fetch error:", error);
            }
        }

        // Load default
        loadCategory('dairy');
    </script>
</body>
</html>
