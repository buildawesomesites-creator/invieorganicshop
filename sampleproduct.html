<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invie Organic Shop</title>
    <style>
        #product-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            padding: 20px;
        }
        .product-card {
            border: 1px solid #ddd;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }
        .product-card img {
            max-width: 100%;
            height: auto;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <h1>Our Products</h1>
    <div id="product-container">
        </div>

    <script>
        // LIST YOUR PRODUCT FILES HERE
        // When you add new products, just add their filenames to this array
        const productFiles = ['milk.json', 'test-product.json']; 

        async function loadProducts() {
            const container = document.getElementById('product-container');
            
            for (const file of productFiles) {
                try {
                    const response = await fetch(`/products/${file}`);
                    const product = await response.json();
                    
                    const card = document.createElement('div');
                    card.className = 'product-card';
                    card.innerHTML = `
                        <img src="${product.image}" alt="${product.title}">
                        <h3>${product.title}</h3>
                        <p>Price: ${product.price}</p>
                        <p>${product.body}</p>
                    `;
                    container.appendChild(card);
                } catch (error) {
                    console.error(`Error loading ${file}:`, error);
                }
            }
        }

        loadProducts();
    </script>
</body>
</html>
