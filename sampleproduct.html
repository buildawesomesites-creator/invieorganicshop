<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invie Organic Shop</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        #category-select { width: 100%; padding: 10px; margin-bottom: 20px; font-size: 16px; }
        #product-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }
        .product-card {
            border: 1px solid #ddd;
            padding: 15px;
            border-radius: 8px;
        }
        .product-card img { width: 100%; height: 200px; object-fit: cover; border-radius: 4px; }
    </style>
</head>
<body>

    <select id="category-select" onchange="loadCategory(this.value)">
        <option value="dairy">Dairy</option>
        <option value="vegetables">Vegetables</option>
        <option value="drinks">Drinks</option>
    </select>

    <div id="product-container"></div>

    <script>
        async function loadCategory(category) {
            const container = document.getElementById('product-container');
            container.innerHTML = 'Loading...';

            try {
                // The ?t=${Date.now()} prevents the browser from using a cached version
                const response = await fetch(`./products/${category}.json?t=${Date.now()}`);
                
                if (!response.ok) throw new Error(`HTTP Error: ${response.status}`);
                
                const products = await response.json();
                container.innerHTML = ''; 
                
                products.forEach(product => {
                    const card = document.createElement('div');
                    card.className = 'product-card';
                    card.innerHTML = `
                        <img src="${product.image}" alt="${product.title}" onerror="this.src='https://via.placeholder.com/200'">
                        <h3>${product.title}</h3>
                        <p>Price: ${product.price}</p>
                    `;
                    container.appendChild(card);
                });
            } catch (error) {
                container.innerHTML = 'Could not load products.';
                console.error("Fetch error:", error);
            }
        }

        loadCategory('dairy');
    </script>
</body>
</html>
